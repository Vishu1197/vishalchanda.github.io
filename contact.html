<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #eef2f7, #dbeafe);
    color: #1e293b;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
}

.nav-links { display: flex; }

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: #1e293b;
    font-weight: 500;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 60px 20px;
}

.subtitle {
    color: #64748b;
    margin-top: 10px;
}

/* GRID */
.contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 25px;
    max-width: 900px;
    margin: 40px auto;
}

/* CARD */
.contact-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 18px;
    text-decoration: none;
    color: #1e293b;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s forwards;
}

.contact-card:nth-child(2){animation-delay:0.2s;}
.contact-card:nth-child(3){animation-delay:0.4s;}
.contact-card:nth-child(4){animation-delay:0.6s;}
.contact-card:nth-child(5){animation-delay:0.8s;}

.contact-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

/* ICON */
.icon {
    width: 65px;
    height: 65px;
    margin: 0 auto 15px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    transition: 0.3s;
}

.icon svg {
    width: 28px;
    height: 28px;
    stroke-width: 1.8;
}

/* COLORS */
.email svg { stroke:#2563eb; }
.call svg { stroke:#2563eb; }

/* HOVER GLOW */
.contact-card:hover .icon { transform: scale(1.1); }
.email:hover .icon { box-shadow: 0 0 20px rgba(37,99,235,0.4); }
.call:hover .icon { box-shadow: 0 0 20px rgba(37,99,235,0.4); }
.whatsapp:hover .icon { box-shadow: 0 0 20px rgba(37,211,102,0.5); }
.github:hover .icon { box-shadow: 0 0 20px rgba(0,0,0,0.3); }
.instagram:hover .icon { box-shadow: 0 0 25px rgba(221,42,123,0.5); }

/* TEXT */
.label { font-weight: 600; }
.subtext { font-size: 13px; color: #64748b; margin-top: 5px; }

/* FLOAT BUTTON */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 24px;
}

/* ANIMATION */
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

/* MOBILE */
@media (max-width: 768px) {
    .navbar { flex-direction: column; text-align: center; }
    .nav-links { margin-top: 10px; }
    .nav-links a { display: inline-block; margin: 8px; }
}
</style>
</head>
