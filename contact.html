<!DOCTYPE html>

<head>
<title>Contact - VirexaAnalytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #eef2f7, #dbeafe);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
}

.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: #1e293b;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 60px 20px;
}

/* GRID */
.contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 25px;
    max-width: 900px;
    margin: 40px auto;
}

/* CARD */
.contact-card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    text-decoration: none;
    color: #1e293b;
    transition: 0.3s;
}

.contact-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* ICON CIRCLE */
.icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 15px auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
}

.icon svg {
    width: 28px;
    height: 28px;
}

/* LABEL */
.label {
    font-weight: 600;
}

/* MOBILE */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .nav-links {
        margin-top: 10px;
    }

    .nav-links a {
        display: inline-block;
        margin: 8px;
    }
}
</style>
</head>
