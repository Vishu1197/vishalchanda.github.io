<!DOCTYPE html>

<head>
<title>Contact - VirexaAnalytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #eef2f7, #dbeafe);
    color: #1e293b;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
}

.nav-links {
    display: flex;
}

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: #1e293b;
    font-weight: 500;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 60px 20px;
}

.subtitle {
    color: #64748b;
    margin-top: 10px;
}

/* GRID */
.contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 25px;
    max-width: 900px;
    margin: 40px auto;
}

/* CARD */
.contact-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 18px;
    text-decoration: none;
    color: #1e293b;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s forwards;
}

.contact-card:nth-child(2){animation-delay:0.2s;}
.contact-card:nth-child(3){animation-delay:0.4s;}
.contact-card:nth-child(4){animation-delay:0.6s;}
.contact-card:nth-child(5){animation-delay:0.8s;}

.contact-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* ICON */
.icon {
    width: 65px;
    height: 65px;
    margin: 0 auto 15px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    transition: 0.3s;
}

.icon svg {
    width: 30px;
    height: 30px;
}

/* TEXT */
.label {
    font-weight: 600;
}

.subtext {
    font-size: 13px;
    color: #64748b;
    margin-top: 5px;
}

/* PLATFORM COLORS */
.email svg { fill:#2563eb; }
.call svg { fill:#2563eb; }
.whatsapp svg { fill:#25D366; }
.github svg { fill:#111827; }
.instagram svg { fill:#E1306C; }

/* FLOATING WHATSAPP */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* ANIMATION */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .nav-links {
        margin-top: 10px;
    }

    .nav-links a {
        display: inline-block;
        margin: 8px;
    }
}
</style>
</head>
