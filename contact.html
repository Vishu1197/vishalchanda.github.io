<!DOCTYPE html>
<html>
<head>
<title>Contact - VirexaAnalytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #eef2f7, #dbeafe);
}

/* NAVBAR (FIXED) */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
}

.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: #1e293b;
}

/* CONTENT */
.container {
    text-align: center;
    padding: 60px 20px;
}

/* NEW CONTACT GRID */
.contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    max-width: 800px;
    margin: 40px auto;
}

/* CARD STYLE */
.contact-card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    text-decoration: none;
    color: #1e293b;
    transition: 0.3s;
}

.contact-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* ICON */
.icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 12px auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.05);
}

.icon svg {
    width: 26px;
    height: 26px;
}

/* LABEL */
.label {
    font-weight: bold;
}

/* MOBILE */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .nav-links {
        margin-top: 10px;
    }

    .nav-links a {
        display: inline-block;
        margin: 8px;
    }
}
</style>
</head>
